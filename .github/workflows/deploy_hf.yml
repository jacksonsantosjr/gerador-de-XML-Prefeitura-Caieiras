name: Sync to Hugging Face Hub # Trigger com novos segredos (Token Write + URL correta)
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          git push --force https://jacksonsantosjr:$HF_TOKEN@$HF_SPACE_URL main
