name: Sync to Hugging Face Hub # Hardcoded Destination Fix
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Endereço confirmado via print do usuário
          HF_REPO="huggingface.co/spaces/jacksonsantosjr/XML-Prefeitura-Caieiras"
          
          echo "Iniciando sincronismo para $HF_REPO..."
          
          # Configurações globais para evitar bloqueios
          git config --global user.email "jackson@example.com"
          git config --global user.name "Jackson Junior"
          
          # Push forçado (necessário devido à purga do LFS que mudou o histórico)
          # Usamos o token diretamente na URL de forma segura (URL-masked nos logs)
          git push --force "https://jacksonsantosjr:$HF_TOKEN@$HF_REPO" main
